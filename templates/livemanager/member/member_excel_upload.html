{% load static %}
{% block content %}
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>회원 가입</title>
    
 <style>
  .signup-wrap { max-width: 540px; margin: 2rem auto; padding: 0 1rem; }
  .form-header { margin-bottom: 2rem; }
  .form-header p { font-size: 13px; color: var(--color-text-secondary); margin: 4px 0 0; }
  .field-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .field-group.single { grid-template-columns: 1fr; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); letter-spacing: 0.03em; }
  .field label span { color: #D85A30; margin-left: 2px; }
  .field input, .field select {
    height: 40px; padding: 0 12px;
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-md);
    background: var(--color-background-primary);
    color: var(--color-text-primary);
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
    box-sizing: border-box;
  }
  .field input:focus, .field select:focus {
    border-color: #7F77DD;
    box-shadow: 0 0 0 2.5px rgba(127,119,221,0.15);
  }
  .field input::placeholder { color: var(--color-text-tertiary); }
  .divider { height: 0.5px; background: var(--color-border-tertiary); margin: 20px 0; }
  .section-label { font-size: 11px; font-weight: 500; color: var(--color-text-tertiary); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px; }
  .submit-btn {
    width: 100%; height: 44px; margin-top: 20px;
    background: #534AB7; color: #fff;
    border: none; border-radius: var(--border-radius-md);
    font-size: 14px; font-weight: 500; cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .submit-btn:hover { background: #3C3489; }
  .submit-btn:active { transform: scale(0.98); }
  .login-link { text-align: center; margin-top: 14px; font-size: 13px; color: var(--color-text-secondary); }
  .login-link a { color: #534AB7; text-decoration: none; font-weight: 500; }
</style>
</head>
<body>

 
<div class="signup-wrap">
  <div class="form-header">
    <h2 style="margin:0; font-size:22px; font-weight:500; color:var(--color-text-primary);">엑셀 회원 가입 </h2>
    <p>의료진 전용 서비스입니다. 정확한 정보를 입력해 주세요.</p>
 {%if error %}
    <p style="color: red;">{{ error }}</p>
 {% endif %}
  </div>
   <form method="post" name="memberForm" action="{% url 'livemanager:member_excel_upload' %}" enctype="multipart/form-data">
    {% csrf_token %}
  <div class="section-label">기본 정보</div>

  <div class="field-group">
    <div class="field">
      <label>첨부파일 <span>*</span></label>
      <input type="file" name="excel_file" id="excel_file"/>
    </div>
  <button  class="submit-btn btn-add" type="button">엑셀업로드</button>
  </form>   
</div>
</body>
</html>
{% endblock %}
{% block script %}
<script type='text/javascript'>

const btn_add = document.querySelector(".btn-add");
btn_add.addEventListener('click', function() {
    const excel_file = document.getElementById("excel_file").value;
    const suc = "0";
    
    if (excel_file == ""){
        alert("첨부파일을 선택해 주세요.");
        document.memberForm.excel_file.focus();
        suc = "1";
        return;
    }
    
    if (suc == "0"){
        document.memberForm.submit();
    }else 
        return;

    
});
</script>
{% endblock %}
