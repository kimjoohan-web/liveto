{% extends 'base.html' %}
{% load pybo_filter %}
{% block content %}

<div class="container my-3">
    <!-- message 표시 -->
    {% if messages %}
    <div class="alert alert-danger my-3" role="alert">
    {% for message in messages %}
        <strong>{{ message.tags }}</strong>
        <ul><li>{{ message.message }}</li></ul>
    {% endfor %}
    </div>
    {% endif %}
    <!-- 질문 -->      
    <div class="mb-3">대기자 : {{ wait.w_name}}    </div>
    <div class="mb-3">게시일 : {{ wait.w_created_at}}</div>
    
    <div class="my-3">
                
       
        <a href="{% url 'waitboard:wait_modify' wait.w_id %}" class="btn btn-sm btn-outline-secondary">수정</a>
        <a href="javascript:void(0)"  class="delete btn btn-sm btn-outline-secondary" data-uri="{% url 'waitboard:wait_delete' wait.w_id %}">삭제</a>
       
        <a href="{% url 'waitboard:wait' %}" class="btn btn-sm btn-outline-secondary">목록</a>
    </div>
</div>


    

{% endblock %}
{% block script %}

<script type='text/javascript'>
const delete_elements = document.getElementsByClassName("delete");
Array.from(delete_elements).forEach(function(element) {
    element.addEventListener('click', function() {
        if(confirm("정말로 삭제하시겠습니까?")) {
            location.href = this.dataset.uri;
        };
    });
});
